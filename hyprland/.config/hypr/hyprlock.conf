general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
}
background {
    monitor =
    # Path to your wallpaper. Leave empty for a solid color.
    path = /home/h/Pictures/wallpaper.jpg   
    color = rgba(25, 20, 20, 1.0)

    # Blur effect (optional)
    blur_passes = 2
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(255, 255, 255)
    fade_on_empty = true
    placeholder_text = <i>Input Password...</i> # Text rendered in the input box
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
    ignore_empty_input = true
}

label {
    monitor =
    text = $TIME
    color = rgba(200, 200, 200, 1.0)
    font_size = 55
    font_family = Fira Semibold
    position = -100, 40
    halign = right
    valign = bottom
    shadow_passes = 5
    shadow_size = 10
}
